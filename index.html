<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRE Tracker Pro - HTPN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        @keyframes alert-blink {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(1.01); }
        }
        .animate-blink { animation: alert-blink 0.7s infinite; }
        .glass-card { background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.2); }
        header { position:relative; overflow:hidden; }
        .header-motif { position:absolute; right:20px; top:50%; transform:translateY(-50%); opacity:0.15; pointer-events:none; }
    </style>
</head>
<body class="min-h-screen pb-16">

<!-- ── HEADER ── -->
<header class="shadow-2xl mb-8" style="background:#0C447C; border-left:8px solid #EF9F27; border-bottom:4px solid #EF9F27;">
    <svg class="header-motif" width="130" height="130" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
        <circle cx="65" cy="65" r="56" fill="none" stroke="white" stroke-width="1.5"/>
        <circle cx="65" cy="65" r="36" fill="none" stroke="white" stroke-width="1.5"/>
        <circle cx="65" cy="65" r="14" fill="white"/>
        <line x1="65" y1="9"   x2="65" y2="1"   stroke="white" stroke-width="1.5"/>
        <line x1="121" y1="65" x2="129" y2="65" stroke="white" stroke-width="1.5"/>
        <line x1="9"  y1="65"  x2="1"  y2="65"  stroke="white" stroke-width="1.5"/>
        <line x1="65" y1="121" x2="65" y2="129" stroke="white" stroke-width="1.5"/>
        <circle cx="106" cy="24"  r="7" fill="white"/>
        <circle cx="24"  cy="24"  r="7" fill="white"/>
        <circle cx="106" cy="106" r="7" fill="white"/>
        <circle cx="24"  cy="106" r="7" fill="white"/>
    </svg>
    <div class="max-w-4xl mx-auto px-6 py-5 flex items-center gap-4">
        <div style="width:68px;height:68px;flex-shrink:0;">
            <svg viewBox="0 0 68 68" xmlns="http://www.w3.org/2000/svg" width="68" height="68">
                <circle cx="34" cy="34" r="30" fill="none" stroke="#EF9F27" stroke-width="3.5" stroke-dasharray="4 2"/>
                <circle cx="34" cy="34" r="22" fill="none" stroke="#EF9F27" stroke-width="1.5"/>
                <rect x="4" y="25" width="60" height="18" rx="4" fill="#EF9F27" transform="rotate(-10 34 34)"/>
                <text x="34" y="37" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="10" font-weight="900" fill="#0C447C" letter-spacing="1" transform="rotate(-10 34 34)">IPC ALERT</text>
                <path id="tA" d="M 10,34 A 24,24 0 0,1 58,34" fill="none"/>
                <text font-family="Plus Jakarta Sans,sans-serif" font-size="7" font-weight="800" fill="#EF9F27" letter-spacing="2"><textPath href="#tA" startOffset="20%">C R E</textPath></text>
                <path id="bA" d="M 10,36 A 24,24 0 0,0 58,36" fill="none"/>
                <text font-family="Plus Jakarta Sans,sans-serif" font-size="6" font-weight="700" fill="#FAC775" letter-spacing="1.5"><textPath href="#bA" startOffset="12%">TRACKER PRO</textPath></text>
            </svg>
        </div>
        <div>
            <div class="flex items-baseline gap-2 flex-wrap">
                <h1 class="text-3xl font-black tracking-tight uppercase leading-none" style="color:#EF9F27;">CRE</h1>
                <h1 class="text-3xl font-black tracking-tight uppercase leading-none text-white">Tracker</h1>
                <span class="text-lg font-black uppercase tracking-[0.3em]" style="color:#FAC775;">PRO</span>
            </div>
            <p class="text-[11px] text-blue-200 font-bold uppercase tracking-widest mt-1">Hospital Tengku Permaisuri Norashikin, Kajang</p>
            <p class="text-[10px] font-medium uppercase tracking-tight mt-0.5" style="color:#B5D4F4;">Infection Prevention &amp; Control Unit</p>
        </div>
    </div>
    <div class="flex gap-2 px-6 pb-3 justify-end max-w-4xl mx-auto">
        <span style="width:8px;height:8px;border-radius:50%;background:#EF9F27;opacity:0.9;display:inline-block;"></span>
        <span style="width:8px;height:8px;border-radius:50%;background:#FAC775;opacity:0.7;display:inline-block;"></span>
        <span style="width:8px;height:8px;border-radius:50%;background:#EF9F27;opacity:0.5;display:inline-block;"></span>
    </div>
</header>

<!-- ── MAIN ── -->
<main class="max-w-3xl mx-auto px-4 space-y-6">

    <div class="glass-card p-8 md:p-12 rounded-[2.5rem] shadow-2xl text-center">
        <h2 class="text-2xl font-black mb-2 text-slate-800 uppercase tracking-tight">CRE Status Check</h2>
        <p class="text-slate-500 mb-8 text-sm font-medium">Enter IC / KP number without dashes.<br>
            <span class="font-mono font-black text-slate-700">Example: 850901036117</span></p>
        <div class="flex flex-col gap-4">
            <input type="text" id="icSearch" maxlength="20" placeholder="KP / IC NUMBER"
                class="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-600 focus:ring-8 focus:ring-blue-50 transition-all text-2xl font-black tracking-[0.2em] text-center shadow-inner placeholder:tracking-normal placeholder:text-slate-300">
            <button onclick="searchPatient()"
                class="bg-blue-800 hover:bg-blue-900 text-white py-6 rounded-3xl font-black text-lg uppercase tracking-widest shadow-xl active:scale-95 transition-all flex justify-center items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                Search
            </button>
        </div>
    </div>

    <div id="resultDisplay"></div>
</main>

<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none z-50 text-xs font-black uppercase tracking-widest border border-white/10"></div>

<script>
// ══════════════════════════════════════════
// PASTE YOUR APPS SCRIPT WEB APP URL HERE ↓
// ══════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvFvhDYqRzzE3UC0_u5RDHNqhvhLuNeDxx6AwiskZjT3k8C3S0h2RD8NUH5uMDWEfBaQ/exec";

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.remove('opacity-0');
    setTimeout(() => t.classList.add('opacity-0'), 3000);
}

// ── Status style config ──────────────────────────────────────
function getStyle(status, screening) {
    const s  = (status    || "").toUpperCase().trim();
    const sc = (screening || "").toUpperCase().trim();

    if (s === "INDEX") return {
        headerBg: "#7f1d1d",
        cardBg: "bg-red-50", border: "border-red-600",
        badge: "bg-red-700 text-white border-red-800",
        blink: "animate-blink",
        bannerBg: "bg-red-100 border-red-300", bannerText: "text-red-900", iconBg: "bg-red-200",
        icon: "🦠", label: "INDEX CASE",
        desc: "This patient is a confirmed CRE Index Case. Contact IPC immediately."
    };

    if (s.includes("CONTACT")) {
        // Complete screening — urgent merah
        if (sc.includes("COMPLETE") && !sc.includes("INCOMPLETE")) return {
            headerBg: "#991b1b",
            cardBg: "bg-red-50", border: "border-red-500",
            badge: "bg-red-600 text-white border-red-700",
            blink: "animate-blink",
            bannerBg: "bg-red-100 border-red-300", bannerText: "text-red-900", iconBg: "bg-red-200",
            icon: "✅", label: "CLOSE CONTACT — COMPLETE SCREENING",
            desc: "CRE screening completed. Maintain precautions until advised."
        };
        // NA — close contact biasa
        if (sc === "NA" || sc === "N/A" || sc.includes("NOT APPLICABLE")) return {
            headerBg: "#92400e",
            cardBg: "bg-yellow-50", border: "border-yellow-500",
            badge: "bg-yellow-400 text-yellow-900 border-yellow-600",
            blink: "animate-blink",
            bannerBg: "bg-yellow-100 border-yellow-300", bannerText: "text-yellow-900", iconBg: "bg-yellow-200",
            icon: "👥", label: "CLOSE CONTACT",
            desc: "Patient is a close contact of a CRE case."
        };
        // Incomplete
        return {
            headerBg: "#92400e",
            cardBg: "bg-yellow-50", border: "border-yellow-500",
            badge: "bg-yellow-400 text-yellow-900 border-yellow-600",
            blink: "animate-blink",
            bannerBg: "bg-yellow-100 border-yellow-300", bannerText: "text-yellow-900", iconBg: "bg-yellow-200",
            icon: "⏳", label: "CLOSE CONTACT — INCOMPLETE SCREENING",
            desc: "CRE screening is still incomplete."
        };
    }

    return {
        headerBg: "#1e3a5f",
        cardBg: "bg-white", border: "border-slate-300",
        badge: "bg-slate-600 text-white border-slate-700",
        blink: "",
        bannerBg: "bg-slate-100 border-slate-200", bannerText: "text-slate-800", iconBg: "bg-slate-200",
        icon: "ℹ️", label: status || "UNKNOWN", desc: ""
    };
}

function screeningChip(sc) {
    const s = (sc || "").toUpperCase().trim();
    if (s.includes("COMPLETE") && !s.includes("INCOMPLETE"))
        return { bg:"bg-red-100 border-red-300", text:"text-red-800", icon:"✅" };
    if (s.includes("INCOMPLETE"))
        return { bg:"bg-yellow-100 border-yellow-300", text:"text-yellow-800", icon:"⏳" };
    if (s === "NA" || s.includes("NOT APPLICABLE"))
        return { bg:"bg-slate-100 border-slate-200", text:"text-slate-500", icon:"—" };
    return { bg:"bg-slate-100 border-slate-200", text:"text-slate-600", icon:"📋" };
}

function detailRow(label, val) {
    if (!val) return "";
    return `
        <div class="bg-slate-50 rounded-2xl px-4 py-3">
            <p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-0.5">${label}</p>
            <p class="text-sm font-black text-slate-800">${val}</p>
        </div>`;
}

async function searchPatient() {
    const raw = document.getElementById('icSearch').value.trim();
    const ic  = raw.replace(/-/g, "").toUpperCase();
    const res = document.getElementById('resultDisplay');

    if (!ic) return showToast("Please enter KP / IC number!");
    if (APPS_SCRIPT_URL.includes("YOUR_")) return showToast("Please set Apps Script URL in HTML.");

    res.innerHTML = `<div class="p-16 text-center animate-pulse"><p class="text-slate-400 font-black uppercase tracking-widest text-xs">Searching CRE 2026 database...</p></div>`;

    try {
        const resp = await fetch(`${APPS_SCRIPT_URL}?ic=${encodeURIComponent(ic)}`);
        const data = await resp.json();

        // ── NOT FOUND ──
        if (data.status === "not_found") {
            res.innerHTML = `
                <div class="bg-white p-12 rounded-[2.5rem] shadow-xl border-l-[16px] border-slate-300 text-center">
                    <p class="text-5xl mb-4">🔍</p>
                    <h3 class="text-2xl font-black text-slate-700 uppercase">No Record Found</h3>
                    <p class="text-slate-500 mt-2 text-sm">KP <span class="font-mono font-black">${ic}</span> was not found in the CRE 2026 database.</p>
                    <p class="text-slate-400 mt-1 text-xs uppercase tracking-widest">OFF TAG patients are not displayed.</p>
                </div>`;
            return;
        }

        // ── FOUND ──
        if (data.status === "found") {
            const d  = data.data;
            const st = getStyle(d.status, d.screening);
            const sc = screeningChip(d.screening);

            const isContact    = (d.status   || "").toUpperCase().includes("CONTACT");
            const isIncomplete = (d.screening|| "").toUpperCase().includes("INCOMPLETE");
            const isIndex      = (d.status   || "").toUpperCase() === "INDEX";

            // Alert hantar rectal swab
            const swabAlert = isIncomplete ? `
                <div class="mt-3 bg-yellow-200 border border-yellow-400 rounded-xl px-4 py-2.5 flex items-center gap-2">
                    <span>🧪</span>
                    <p class="text-xs font-black text-yellow-900 uppercase tracking-wide">⚠️ Send rectal swab if not yet submitted.</p>
                </div>` : "";

            // Checklist IPC untuk contact
            const indexActions = [
                "Isolate or cohort patient immediately.",
                "Place Contact Precaution signage and tag BHT / Appointment card.",
                "Strict Hand Hygiene at all WHO 5 Moments.",
                "Don single-use PPE before entering patient zone; remove and discard before leaving.",
                "Dedicated equipment (BP cuff, stethoscope) for the patient; disinfect before and after use.",
                "Notify UKI team and treating physician immediately.",
                "Send MDRO Notification Form to UKI team."
            ];
            const contactActions = [
                "Isolate or cohort patient immediately.",
                "Place Contact Precaution signage and tag BHT / Appointment card.",
                "Strict Hand Hygiene at all WHO 5 Moments.",
                "Don single-use PPE before entering patient zone; remove and discard before leaving.",
                "Dedicated equipment (BP cuff, stethoscope) for the patient; disinfect before and after use.",
                "Notify UKI team and treating physician."
            ];
            const ipcActions = isIndex ? indexActions : contactActions;
            const ipcChecklist = (isContact || isIndex) ? `
                <div class="mt-5 ${isIndex ? 'bg-red-100 border-red-400' : 'bg-red-50 border-red-200'} border-2 rounded-[1.5rem] p-5">
                    <h4 class="text-[10px] font-black uppercase tracking-widest text-red-700 mb-3">⚠️ Mandatory IPC Actions:</h4>
                    <div class="space-y-2">
                        ${ipcActions.map(t=>`
                        <div class="flex items-start gap-3">
                            <span class="text-red-500 font-black flex-shrink-0 mt-0.5">•</span>
                            <span class="text-sm font-bold text-red-900">${t}</span>
                        </div>`).join('')}
                    </div>
                </div>` : "";

            // Organism block
            const orgBlock = d.organisma ? `
                <div class="bg-blue-50 border-2 border-blue-200 rounded-[1.5rem] p-5 mb-4">
                    <p class="text-[9px] font-black uppercase tracking-widest text-blue-500 mb-1">Organisma</p>
                    <p class="text-base font-black text-blue-900 uppercase leading-snug">${d.organisma}</p>
                    ${d.sample ? `<p class="text-xs text-blue-600 mt-1 font-bold uppercase">Sample: ${d.sample}</p>` : ""}
                    ${d.positive_date ? `<p class="text-xs text-red-600 mt-1 font-bold uppercase">Positive Date: ${d.positive_date}</p>` : ""}
                </div>` : "";

            res.innerHTML = `
                <!-- Header -->
                <div class="rounded-t-[2.5rem] text-white shadow-2xl px-8 pt-8 pb-6" style="background:${st.headerBg};">
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-1">Patient Details · CRE 2026</p>
                    <h3 class="text-3xl font-black uppercase leading-tight tracking-tight">${d.nama || "—"}</h3>
                    <p class="font-mono mt-1 opacity-80 tracking-widest text-sm">${d.kp}</p>
                    <p class="text-[10px] opacity-40 mt-1 uppercase tracking-widest">Latest record displayed</p>
                </div>

                <!-- Body card -->
                <div class="${st.cardBg} px-8 pt-6 pb-8 border-x-[12px] ${st.border} border-b border-slate-100 shadow-xl rounded-b-[2.5rem]">

                    <!-- Status badge top right -->
                    <div class="flex justify-end mb-5">
                        <span class="px-5 py-2.5 rounded-2xl text-[11px] font-black uppercase border-2 ${st.badge} ${st.blink} shadow-sm">
                            ${d.status || "—"}
                        </span>
                    </div>

                    <!-- Banner status -->
                    <div class="${st.bannerBg} border-2 rounded-[1.5rem] p-4 flex items-center gap-4 mb-4 shadow-inner">
                        <div class="${st.iconBg} rounded-xl w-12 h-12 flex items-center justify-center text-2xl flex-shrink-0">${st.icon}</div>
                        <div class="flex-1">
                            <p class="text-[10px] font-black uppercase tracking-widest ${st.bannerText} opacity-60 mb-0.5">Case Status</p>
                            <p class="font-black uppercase text-sm ${st.bannerText} leading-tight">${st.label}</p>
                            ${st.desc ? `<p class="text-xs ${st.bannerText} opacity-70 mt-0.5">${st.desc}</p>` : ""}
                            ${swabAlert}
                        </div>
                    </div>

                    <!-- Screening chip -->
                    <div class="${sc.bg} border rounded-2xl px-4 py-3 mb-4 flex items-center gap-3">
                        <span class="text-xl">${sc.icon}</span>
                        <div>
                            <p class="text-[9px] font-black uppercase tracking-widest opacity-50">Screening</p>
                            <p class="text-sm font-black uppercase ${sc.text}">${d.screening || "—"}</p>
                        </div>
                    </div>

                    ${orgBlock}

                    <!-- Detail grid -->
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
                        ${detailRow("Ward / Unit",   d.wad)}
                        ${detailRow("Bed",           d.bed)}
                        ${detailRow("RN",            d.rn)}
                        ${detailRow("Date Admitted",  d.doa)}
                        ${detailRow("Date Discharged", d.dod)}
                        ${detailRow("Ix Sent",     d.ix_hantar)}
                    </div>

                    ${ipcChecklist}

                </div>
            `;
        }

    } catch (err) {
        console.error(err);
        showToast("Connection error — semak URL Apps Script.");
        res.innerHTML = `
            <div class="bg-white p-10 rounded-[2.5rem] shadow text-center border-l-8 border-red-400">
                <p class="text-3xl mb-3">⚠️</p>
                <p class="font-black text-red-700 uppercase text-lg">Connection Failed</p>
                <p class="text-slate-500 text-sm mt-1">Check Apps Script URL or internet connection.</p>
            </div>`;
    }
}

document.getElementById("icSearch").addEventListener("keypress", e => {
    if (e.key === "Enter") searchPatient();
});
</script>
</body>
</html>
